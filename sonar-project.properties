sonar.projectKey=Tom4U_toms-stats
sonar.organization=tom4u
sonar.projectName=toms-stats

sonar.sources=apps,packages
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/lib/**,\
  **/.svelte-kit/**,\
  **/storybook-static/**,\
  **/build/**,\
  **/coverage/**,\
  **/*.stories.svelte,\
  **/vitest.setup.ts,\
  **/playwright.config.ts

sonar.test.inclusions=\
  **/*.test.ts,\
  **/*.spec.ts,\
  **/*.svelte.test.ts,\
  **/*.svelte.spec.ts

sonar.coverage.exclusions=\
  **/*.test.ts,\
  **/*.spec.ts,\
  **/*.stories.svelte,\
  **/vitest.setup.ts,\
  **/playwright.config.ts

sonar.typescript.lcov.reportPaths=\
  apps/tracker/coverage/lcov.info,\
  apps/dashboard/coverage/lcov.info

sonar.sourceEncoding=UTF-8
