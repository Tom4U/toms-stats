<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640" role="img" aria-label="toms-stats social preview">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e3a5f"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#0369a1"/>
      <stop offset="100%" style="stop-color:#38bdf8"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#0284c7"/>
      <stop offset="100%" style="stop-color:#7dd3fc"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#0369a1"/>
      <stop offset="100%" style="stop-color:#0ea5e9"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="160" x2="1280" y2="160" stroke="#ffffff08" stroke-width="1"/>
  <line x1="0" y1="320" x2="1280" y2="320" stroke="#ffffff08" stroke-width="1"/>
  <line x1="0" y1="480" x2="1280" y2="480" stroke="#ffffff08" stroke-width="1"/>

  <!-- Left side: Logo + title -->
  <g transform="translate(100, 200)">
    <!-- Logo icon -->
    <circle cx="52" cy="52" r="48" fill="#1e293b" stroke="#334155" stroke-width="2"/>
    <rect x="28" y="60" width="12" height="20" rx="2" fill="#38bdf8"/>
    <rect x="43" y="48" width="12" height="32" rx="2" fill="#38bdf8"/>
    <rect x="58" y="38" width="12" height="42" rx="2" fill="#0ea5e9"/>
    <rect x="73" y="30" width="12" height="50" rx="2" fill="#0284c7"/>
    <polyline points="34,58 49,46 64,36 79,28" stroke="#f0f9ff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <circle cx="79" cy="28" r="5" fill="#f0f9ff"/>

    <!-- Title -->
    <text x="120" y="44" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="700" fill="#f1f5f9" letter-spacing="-2">toms-stats</text>
    <!-- Subtitle -->
    <text x="122" y="84" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="#94a3b8" letter-spacing="0">Cookie-free · Self-hosted · Privacy-first</text>
  </g>

  <!-- Right side: Decorative chart -->
  <g transform="translate(700, 80)">
    <!-- Dashboard card mockup -->
    <rect x="0" y="0" width="480" height="480" rx="16" fill="#1e293b" stroke="#334155" stroke-width="1"/>

    <!-- Card header -->
    <rect x="0" y="0" width="480" height="52" rx="16" fill="#1e293b"/>
    <rect x="0" y="36" width="480" height="16" fill="#1e293b"/>
    <text x="24" y="34" font-family="system-ui, sans-serif" font-size="16" fill="#94a3b8">Page Views — last 7 days</text>

    <!-- Stat numbers -->
    <text x="24" y="110" font-family="system-ui, sans-serif" font-size="48" font-weight="700" fill="#f1f5f9">12,483</text>
    <text x="24" y="138" font-family="system-ui, sans-serif" font-size="16" fill="#22d3ee">↑ 18% vs. last week</text>

    <!-- Bar chart -->
    <g transform="translate(24, 160)">
      <!-- Bars (7 days) -->
      <rect x="0"   y="160" width="46" height="40"  rx="4" fill="url(#bar3)" opacity="0.8"/>
      <rect x="56"  y="120" width="46" height="80"  rx="4" fill="url(#bar3)" opacity="0.9"/>
      <rect x="112" y="100" width="46" height="100" rx="4" fill="url(#bar2)"/>
      <rect x="168" y="80"  width="46" height="120" rx="4" fill="url(#bar2)"/>
      <rect x="224" y="60"  width="46" height="140" rx="4" fill="url(#bar1)"/>
      <rect x="280" y="90"  width="46" height="110" rx="4" fill="url(#bar2)"/>
      <rect x="336" y="40"  width="46" height="160" rx="4" fill="url(#bar1)"/>

      <!-- Day labels -->
      <text x="16"  y="220" font-family="system-ui, sans-serif" font-size="13" fill="#64748b">Mon</text>
      <text x="72"  y="220" font-family="system-ui, sans-serif" font-size="13" fill="#64748b">Tue</text>
      <text x="126" y="220" font-family="system-ui, sans-serif" font-size="13" fill="#64748b">Wed</text>
      <text x="182" y="220" font-family="system-ui, sans-serif" font-size="13" fill="#64748b">Thu</text>
      <text x="237" y="220" font-family="system-ui, sans-serif" font-size="13" fill="#64748b">Fri</text>
      <text x="292" y="220" font-family="system-ui, sans-serif" font-size="13" fill="#64748b">Sat</text>
      <text x="347" y="220" font-family="system-ui, sans-serif" font-size="13" fill="#64748b">Sun</text>
    </g>

    <!-- Mini stats row -->
    <g transform="translate(24, 410)">
      <rect x="0" y="0" width="130" height="52" rx="8" fill="#0f172a"/>
      <text x="10" y="20" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">Visitors</text>
      <text x="10" y="42" font-family="system-ui, sans-serif" font-size="20" font-weight="600" fill="#38bdf8">3,241</text>

      <rect x="145" y="0" width="130" height="52" rx="8" fill="#0f172a"/>
      <text x="155" y="20" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">Bounce</text>
      <text x="155" y="42" font-family="system-ui, sans-serif" font-size="20" font-weight="600" fill="#38bdf8">42%</text>

      <rect x="290" y="0" width="130" height="52" rx="8" fill="#0f172a"/>
      <text x="300" y="20" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">Duration</text>
      <text x="300" y="42" font-family="system-ui, sans-serif" font-size="20" font-weight="600" fill="#38bdf8">2m 14s</text>
    </g>
  </g>

  <!-- Bottom: tech tags -->
  <g transform="translate(100, 540)">
    <rect x="0"   y="0" width="120" height="32" rx="16" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <text x="24"  y="21" font-family="system-ui, sans-serif" font-size="14" fill="#94a3b8">Firebase</text>

    <rect x="136" y="0" width="120" height="32" rx="16" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <text x="156" y="21" font-family="system-ui, sans-serif" font-size="14" fill="#94a3b8">SvelteKit</text>

    <rect x="272" y="0" width="120" height="32" rx="16" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <text x="286" y="21" font-family="system-ui, sans-serif" font-size="14" fill="#94a3b8">TypeScript</text>

    <rect x="408" y="0" width="160" height="32" rx="16" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <text x="420" y="21" font-family="system-ui, sans-serif" font-size="14" fill="#94a3b8">GPL-3.0 · Open Source</text>
  </g>
</svg>
