name: PR Auto-Ready

# Fires when the CI workflow completes on a PR branch.
# On success: tick the "CI green" checkbox and undraft the PR.
# On non-success: post a comment listing which jobs failed/cancelled.

on:
  workflow_run:
    workflows: ['CI']
    types: [completed]

permissions:
  pull-requests: write
  issues: write
  contents: read

jobs:
  auto-ready:
    name: Auto-ready on green CI
    runs-on: ubuntu-latest
    # Only act on PR-triggered CI runs; exclude main and release branches.
    if: >
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.head_branch != 'main' &&
      !startsWith(github.event.workflow_run.head_branch, 'release-')

    steps:
      - name: Find PR for this workflow run
        id: find-pr
        uses: actions/github-script@v9.0.0
        with:
          script: |
            const run = context.payload.workflow_run;

            // workflow_run payload contains PR stubs — draft status is not reliable there.
            // Always resolve the PR number from the payload, then fetch fresh state via REST.
            const linkedPrs = run.pull_requests ?? [];
            let prNumber = linkedPrs.length > 0 ? linkedPrs[0].number : null;

            if (!prNumber) {
              // Fallback: query open PRs for this branch (cross-fork or edge case).
              const { data: prs } = await github.rest.pulls.list({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                head: `${context.repo.owner}:${run.head_branch}`,
              });
              if (prs.length === 0) {
                core.info('No open PR found for branch ' + run.head_branch);
                return null;
              }
              prNumber = prs[0].number;
            }

            // Fetch fresh PR state so draft status is accurate.
            const { data: fresh } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            core.setOutput('pr_number', String(prNumber));
            core.setOutput('is_draft', fresh.draft ? 'true' : 'false');
            return prNumber;

      - name: Handle CI non-success — post comment with failed jobs
        if: >
          steps.find-pr.outputs.pr_number != '' &&
          github.event.workflow_run.conclusion != 'success'
        uses: actions/github-script@v9.0.0
        with:
          script: |
            const prNumber = parseInt('${{ steps.find-pr.outputs.pr_number }}');
            const run = context.payload.workflow_run;
            const conclusion = run.conclusion;

            // Fetch jobs to list which ones failed/cancelled.
            const { data: jobsData } = await github.rest.actions.listJobsForWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: run.id,
            });

            const failedJobs = jobsData.jobs.filter(
              (j) => j.conclusion !== 'success' && j.conclusion !== 'skipped'
            );

            const jobList = failedJobs.length > 0
              ? failedJobs.map((j) => `- **${j.name}** (${j.conclusion})`).join('\n')
              : '_No individual job details available._';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: `### CI ${conclusion}\n\n` +
                    `[View run](${run.html_url})\n\n` +
                    `**Jobs that did not pass:**\n${jobList}\n\n` +
                    `The PR remains in Draft until CI is green.`,
            });

      - name: Tick CI-green checkbox and undraft PR
        if: >
          steps.find-pr.outputs.pr_number != '' &&
          github.event.workflow_run.conclusion == 'success'
        uses: actions/github-script@v9.0.0
        with:
          github-token: ${{ secrets.RELEASE_PLEASE_PAT }}
          script: |
            const prNumber = parseInt('${{ steps.find-pr.outputs.pr_number }}');
            const isDraft = '${{ steps.find-pr.outputs.is_draft }}' === 'true';

            // Single REST call for body (checkbox tick) and node_id (undraft mutation).
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            const tickedBody = pr.body
              ? pr.body.replace(/- \[ \] CI green/, '- [x] CI green')
              : pr.body;

            if (tickedBody !== pr.body) {
              await github.rest.pulls.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                body: tickedBody,
              });
              core.info('CI green checkbox ticked.');
            }

            // Undraft the PR via GraphQL (REST has no undraft endpoint).
            if (isDraft) {
              await github.graphql(`
                mutation($id: ID!) {
                  markPullRequestReadyForReview(input: { pullRequestId: $id }) {
                    pullRequest { isDraft }
                  }
                }
              `, { id: pr.node_id });
              core.info('PR marked ready for review.');
            } else {
              core.info('PR was already ready for review.');
            }

      - name: Resolve Copilot review threads
        if: >
          steps.find-pr.outputs.pr_number != '' &&
          github.event.workflow_run.conclusion == 'success'
        uses: actions/github-script@v9.0.0
        with:
          script: |
            const prNumber = parseInt('${{ steps.find-pr.outputs.pr_number }}');

            // Fetch all review threads with pagination.
            let threads = [];
            let cursor = null;
            do {
              const result = await github.graphql(`
                query($owner: String!, $repo: String!, $pr: Int!, $cursor: String) {
                  repository(owner: $owner, name: $repo) {
                    pullRequest(number: $pr) {
                      reviewThreads(first: 100, after: $cursor) {
                        pageInfo { hasNextPage endCursor }
                        nodes {
                          id
                          isResolved
                          comments(first: 5) {
                            nodes { author { login } body }
                          }
                        }
                      }
                    }
                  }
                }
              `, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pr: prNumber,
                cursor,
              });

              const page = result.repository.pullRequest.reviewThreads;
              threads = threads.concat(page.nodes);
              cursor = page.pageInfo.hasNextPage ? page.pageInfo.endCursor : null;
            } while (cursor);

            const copilotThreads = threads.filter(
              (t) =>
                !t.isResolved &&
                t.comments.nodes.some(
                  (c) => c.author?.login === 'copilot-pull-request-reviewer'
                )
            );

            core.info(`Found ${copilotThreads.length} open Copilot thread(s).`);

            for (const thread of copilotThreads) {
              const firstComment = thread.comments.nodes[0];
              core.info(`Resolving thread: ${firstComment?.body?.slice(0, 80)}…`);

              await github.graphql(`
                mutation($id: ID!) {
                  resolveReviewThread(input: { threadId: $id }) {
                    thread { isResolved }
                  }
                }
              `, { id: thread.id });
            }

            core.info(
              copilotThreads.length > 0
                ? 'All Copilot threads resolved.'
                : 'No open Copilot threads found.'
            );
