name: Mutation Testing

on:
  push:
    branches:
      - main
    paths:
      - 'apps/tracker/src/**'
      - 'apps/tracker/stryker.config.json'
      - 'apps/tracker/package.json'
      - 'package-lock.json'
  schedule:
    # Every Monday at 06:00 UTC
    - cron: '0 6 * * 1'
  workflow_dispatch:

concurrency:
  group: mutation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mutation-tracker:
    name: Stryker Mutation Tests (tracker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: '21'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build shared package
        run: npm -w packages/shared run build

      - name: Build tracker
        run: npm -w apps/tracker run build

      - name: Run mutation tests with emulators
        run: >-
          ./node_modules/.bin/firebase emulators:exec
          --project demo-toms-stats
          --only firestore,auth,functions
          "npm -w apps/tracker run test:mutation"

      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: mutation-report
          path: apps/tracker/reports/mutation/
          retention-days: 30
