name: Storybook → GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'apps/dashboard/src/**'
      - 'apps/dashboard/.storybook/**'
      - 'apps/dashboard/package.json'

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Storybook
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6.0.8
        with:
          version: 11.5.1

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        # NOSONAR: playwright install must run scripts to download and unpack browser binaries
        run: pnpm --filter @tom4u-stats/dashboard exec playwright install chromium --with-deps

      - name: Build Storybook
        run: pnpm --filter @tom4u-stats/dashboard run build-storybook

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: apps/dashboard/storybook-static

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
