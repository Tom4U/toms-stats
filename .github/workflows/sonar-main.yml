name: SonarQube (main)

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'specs/**'
      - 'LICENSE'

concurrency:
  group: sonar-main
  cancel-in-progress: true

jobs:
  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0  # shallow clones disabled for better analysis relevancy

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Generate dashboard coverage
        run: npm -w apps/dashboard run test:coverage

      - uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: '21'

      - name: Build shared package
        run: npm -w packages/shared run build

      - name: Build tracker
        run: npm -w apps/tracker run build

      - name: Generate tracker coverage (Firebase Emulators)
        run: ./node_modules/.bin/firebase emulators:exec --project demo-toms-stats --only firestore,auth,functions "npm -w apps/tracker run test:coverage"

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@59db25f34e16620e48ab4bb9e4a5dce155cb5432 # v8.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
