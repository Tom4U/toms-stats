name: CI

on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'specs/**'
      - 'LICENSE'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-markdown:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Lint Markdown
        run: npm run lint:md

  lint-and-check:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build shared package
        run: npm -w packages/shared run build

      - name: Type check tracker
        run: npm -w apps/tracker run check

      - name: Type check dashboard
        run: npm -w apps/dashboard run check

      - name: Lint dashboard
        run: npm -w apps/dashboard run lint

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run shared package tests
        run: npm -w packages/shared run test

      - name: Run dashboard unit tests (server)
        run: npm -w apps/dashboard run test:unit -- --project=server --run --reporter=github-actions

      - name: Generate dashboard coverage
        run: npm -w apps/dashboard run test:coverage

      - name: Upload dashboard coverage
        uses: actions/upload-artifact@v7
        with:
          name: dashboard-coverage
          path: apps/dashboard/coverage/lcov.info
          retention-days: 1

  test-integration:
    name: Integration Tests (Firebase Emulators)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: '21'

      - name: Build shared package
        run: npm -w packages/shared run build

      - name: Build tracker
        run: npm -w apps/tracker run build

      - name: Run tracker tests with emulators
        run: ./node_modules/.bin/firebase emulators:exec --project demo-toms-stats --only firestore,auth,functions "npm -w apps/tracker run test:coverage"

      - name: Upload tracker coverage
        uses: actions/upload-artifact@v7
        with:
          name: tracker-coverage
          path: apps/tracker/coverage/lcov.info
          retention-days: 1

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-and-check]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build shared package
        run: npm -w packages/shared run build

      - name: Build tracker
        run: npm -w apps/tracker run build

      - name: Build dashboard
        run: npm -w apps/dashboard run build

  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest
    needs: [test-unit, test-integration]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0  # shallow clones disabled for better analysis relevancy

      - name: Download dashboard coverage
        uses: actions/download-artifact@v8
        with:
          name: dashboard-coverage
          path: apps/dashboard/coverage

      - name: Download tracker coverage
        uses: actions/download-artifact@v8
        with:
          name: tracker-coverage
          path: apps/tracker/coverage

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@59db25f34e16620e48ab4bb9e4a5dce155cb5432 # v8.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
