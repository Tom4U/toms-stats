name: CI

on:
  pull_request:
    branches:
      - main
  # release-please pushes directly via API — no pull_request event fires.
  # Adding push here ensures CI runs (and required checks are satisfied) on
  # every release-please branch update.
  push:
    branches:
      - release-please--branches--main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  paths:
    name: Detect Changed Paths
    runs-on: ubuntu-latest
    outputs:
      markdown: ${{ steps.filter.outputs.markdown }}
      tracker: ${{ steps.filter.outputs.tracker }}
      dashboard: ${{ steps.filter.outputs.dashboard }}
      shared: ${{ steps.filter.outputs.shared }}
      firestore: ${{ steps.filter.outputs.firestore }}
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v6

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            markdown:
              - '**/*.md'
              - '.markdownlint*'
            tracker:
              - 'apps/tracker/src/**'
              - 'apps/tracker/test/**'
              - 'apps/tracker/tsconfig*.json'
              - 'apps/tracker/stryker.config.json'
              - '!apps/tracker/package.json'
              - '!apps/tracker/CHANGELOG.md'
            dashboard:
              - 'apps/dashboard/src/**'
              - 'apps/dashboard/.storybook/**'
              - 'apps/dashboard/tsconfig*.json'
              - '!apps/dashboard/package.json'
              - '!apps/dashboard/CHANGELOG.md'
            shared:
              - 'packages/shared/src/**'
              - 'packages/shared/tsconfig*.json'
              - '!packages/shared/package.json'
              - '!packages/shared/CHANGELOG.md'
            firestore:
              - 'firestore.rules'
              - 'firestore.indexes.json'
            code:
              - 'apps/tracker/src/**'
              - 'apps/tracker/test/**'
              - 'apps/tracker/tsconfig*.json'
              - 'apps/dashboard/src/**'
              - 'apps/dashboard/.storybook/**'
              - 'apps/dashboard/tsconfig*.json'
              - 'packages/shared/src/**'
              - 'packages/shared/tsconfig*.json'
              - 'firestore.rules'
              - 'firestore.indexes.json'
              - 'package-lock.json'
              - 'tsconfig*.json'
              - '.github/workflows/ci.yml'

  lint-markdown:
    name: Markdown Lint
    runs-on: ubuntu-latest
    needs: [paths]
    if: needs.paths.outputs.markdown == 'true'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Lint Markdown
        run: npm run lint:md

  spec-coupling:
    name: Spec-Coupling Gate
    runs-on: ubuntu-latest
    needs: [paths]
    if: needs.paths.outputs.code == 'true'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Check spec coupling
        run: node scripts/check-spec-coupling.mjs
        env:
          GITHUB_BASE_REF: ${{ github.base_ref || 'main' }}
          SPEC_COUPLING_EXEMPT: ${{ contains(github.event.pull_request.labels.*.name, 'no-spec-change') && '1' || '0' }}

  lint-tracker:
    name: Lint Tracker
    runs-on: ubuntu-latest
    needs: [paths]
    if: needs.paths.outputs.tracker == 'true' || needs.paths.outputs.shared == 'true'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build shared package
        run: npm -w packages/shared run build

      - name: Type check tracker
        run: npm -w apps/tracker run check

      - name: Lint tracker
        run: npm -w apps/tracker run lint

  lint-dashboard:
    name: Lint Dashboard
    runs-on: ubuntu-latest
    needs: [paths]
    if: needs.paths.outputs.dashboard == 'true' || needs.paths.outputs.shared == 'true'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build shared package
        run: npm -w packages/shared run build

      - name: Type check dashboard
        run: npm -w apps/dashboard run check

      - name: Lint dashboard
        run: npm -w apps/dashboard run lint

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [paths]
    if: needs.paths.outputs.dashboard == 'true' || needs.paths.outputs.shared == 'true'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run shared package tests
        run: npm -w packages/shared run test

      - name: Run dashboard unit tests (server)
        run: npm -w apps/dashboard run test:unit -- --project=server --run --reporter=github-actions

      - name: Generate dashboard coverage
        run: npm -w apps/dashboard run test:coverage

      - name: Upload dashboard coverage
        uses: actions/upload-artifact@v7
        with:
          name: dashboard-coverage
          path: apps/dashboard/coverage/lcov.info
          retention-days: 1

  test-integration:
    name: Integration Tests (Firebase Emulators)
    runs-on: ubuntu-latest
    needs: [paths]
    if: >
      needs.paths.outputs.tracker == 'true' ||
      needs.paths.outputs.shared == 'true' ||
      needs.paths.outputs.firestore == 'true'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: '21'

      - name: Build shared package
        run: npm -w packages/shared run build

      - name: Build tracker
        run: npm -w apps/tracker run build

      - name: Run tracker tests with emulators
        run: ./node_modules/.bin/firebase emulators:exec --project demo-toms-stats --only firestore,auth,functions "npm -w apps/tracker run test:coverage"

      - name: Upload tracker coverage
        uses: actions/upload-artifact@v7
        with:
          name: tracker-coverage
          path: apps/tracker/coverage/lcov.info
          retention-days: 1

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [paths, lint-tracker, lint-dashboard]
    # Run when code changed and neither lint job failed (skipped counts as passing here).
    if: >
      needs.paths.outputs.code == 'true' &&
      needs.lint-tracker.result != 'failure' &&
      needs.lint-dashboard.result != 'failure'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build shared package
        run: npm -w packages/shared run build

      - name: Build tracker
        run: npm -w apps/tracker run build

      - name: Build dashboard
        run: npm -w apps/dashboard run build

  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest
    needs: [paths, test-unit, test-integration]
    # Only run when code changed and at least one test job actually produced coverage.
    if: >
      needs.paths.outputs.code == 'true' && (
        needs.test-unit.result == 'success' ||
        needs.test-integration.result == 'success'
      )
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0  # shallow clones disabled for better analysis relevancy

      - name: Download dashboard coverage
        if: needs.test-unit.result == 'success'
        uses: actions/download-artifact@v8
        with:
          name: dashboard-coverage
          path: apps/dashboard/coverage

      - name: Download tracker coverage
        if: needs.test-integration.result == 'success'
        uses: actions/download-artifact@v8
        with:
          name: tracker-coverage
          path: apps/tracker/coverage

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@59db25f34e16620e48ab4bb9e4a5dce155cb5432 # v8.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

  # Guard jobs — always run; succeed when the real job passed or was skipped (no relevant
  # file changes). Same names as the real jobs so branch-protection needs no update.
  # release-please PRs change only CHANGELOG/version files and skip all real jobs.
  guard-markdown-lint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    needs: [lint-markdown]
    if: always()
    steps:
      - name: Check result
        run: |
          r="${{ needs.lint-markdown.result }}"
          [[ "$r" == "failure" || "$r" == "cancelled" ]] && exit 1 || exit 0

  guard-unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [test-unit]
    if: always()
    steps:
      - name: Check result
        run: |
          r="${{ needs.test-unit.result }}"
          [[ "$r" == "failure" || "$r" == "cancelled" ]] && exit 1 || exit 0

  guard-integration-tests:
    name: Integration Tests (Firebase Emulators)
    runs-on: ubuntu-latest
    needs: [test-integration]
    if: always()
    steps:
      - name: Check result
        run: |
          r="${{ needs.test-integration.result }}"
          [[ "$r" == "failure" || "$r" == "cancelled" ]] && exit 1 || exit 0

  guard-build:
    name: Build
    runs-on: ubuntu-latest
    needs: [build]
    if: always()
    steps:
      - name: Check result
        run: |
          r="${{ needs.build.result }}"
          [[ "$r" == "failure" || "$r" == "cancelled" ]] && exit 1 || exit 0

  guard-sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest
    needs: [sonarqube]
    if: always()
    steps:
      - name: Check result
        run: |
          r="${{ needs.sonarqube.result }}"
          [[ "$r" == "failure" || "$r" == "cancelled" ]] && exit 1 || exit 0

  guard-spec-coupling:
    name: Spec-Coupling Gate
    runs-on: ubuntu-latest
    needs: [spec-coupling]
    if: always()
    steps:
      - name: Check result
        run: |
          r="${{ needs.spec-coupling.result }}"
          [[ "$r" == "failure" || "$r" == "cancelled" ]] && exit 1 || exit 0

  guard-lint-tracker:
    name: Lint Tracker
    runs-on: ubuntu-latest
    needs: [lint-tracker]
    if: always()
    steps:
      - name: Check result
        run: |
          r="${{ needs.lint-tracker.result }}"
          [[ "$r" == "failure" || "$r" == "cancelled" ]] && exit 1 || exit 0

  guard-lint-dashboard:
    name: Lint Dashboard
    runs-on: ubuntu-latest
    needs: [lint-dashboard]
    if: always()
    steps:
      - name: Check result
        run: |
          r="${{ needs.lint-dashboard.result }}"
          [[ "$r" == "failure" || "$r" == "cancelled" ]] && exit 1 || exit 0
