name: Deploy to Firebase

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'specs/**'
      - 'LICENSE'

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build shared package
        run: npm -w packages/shared run build

      - name: Build tracker
        run: npm -w apps/tracker run build

      - name: Build dashboard
        run: npm -w apps/dashboard run build

      - name: Deploy to Firebase Hosting + Functions
        uses: FirebaseExtended/action-hosting-deploy@v0.10.0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: toms-stats
          channelId: live
